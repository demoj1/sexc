name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Sets up the OCaml toolchain + opam, and caches the switch between runs.
      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5"

      # The compiler's only external library is Core; dune is the build system.
      # No .opam file (generate_opam_files is off), so install deps explicitly.
      # Retry to ride out transient GitHub codeload 5xx on source tarballs —
      # opam install is idempotent, a retry just fetches what's missing.
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if opam install --yes core dune; then
              exit 0
            fi
            echo "::warning::opam install failed (attempt ${attempt}/3), retrying in 15s..."
            sleep 15
          done
          echo "::error::opam install failed after 3 attempts"
          exit 1

      - name: Build
        run: opam exec -- make build

      # The suite is bash + gcc only. std/*.sexc is resolved relative to the
      # repo root (./std), so nothing needs to be installed first. On macOS
      # `gcc` is the Apple clang shim from the preinstalled Command Line Tools.
      - name: Test
        run: opam exec -- make test

      # Bundle binary + stdlib + installer + bundle README (the binary needs
      # std/*.sexc at runtime, and finds it next to itself). Named by OS + short
      # commit hash — no versions yet, hashes only.
      - name: Package
        run: |
          short="${GITHUB_SHA::7}"
          os="$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')"
          dist="sexc-${os}-${short}"
          mkdir -p "dist/${dist}/std"
          cp sexc "dist/${dist}/"
          cp std/*.sexc "dist/${dist}/std/"
          cp scripts/install.sh "dist/${dist}/"
          chmod +x "dist/${dist}/install.sh"
          cp scripts/dist-README.md "dist/${dist}/README.md"
          cp LICENSE "dist/${dist}/" 2>/dev/null || true
          tar -czf "dist/${dist}.tar.gz" -C dist "${dist}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # Publish a prerelease tagged with the commit hash, carrying both platform
  # bundles. Runs only on master push after both matrix builds go green.
  release:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
          merge-multiple: true

      # Tag is prefixed because GitHub rejects tag names that are exactly 40 or
      # 64 hex chars (indistinguishable from a SHA-1/SHA-256 commit hash).
      - name: Create prerelease for this commit
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: build ${{ github.sha }}
          prerelease: true
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
